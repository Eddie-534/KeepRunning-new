<svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bronze Shoe - Level 2 -->
  <defs>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style={{stopColor: "#cd7f32", stopOpacity: 1}} />
      <stop offset="50%" style={{stopColor: "#b87333", stopOpacity: 1}} />
      <stop offset="100%" style={{stopColor: "#8b4513", stopOpacity: 1}} />
    </linearGradient>
    <filter id="bronzeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Shoe sole -->
  <path d="M8 52 L25 38 L42 44 L62 41 L82 48 L92 56 L87 72 L13 72 Z" fill="url(#bronzeGrad)" stroke="#8b4513" stroke-width="2" filter="url(#bronzeGlow)"/>
  <!-- Shoe upper -->
  <path d="M25 38 L35 24 L50 22 L65 26 L75 36 L62 41 Z" fill="#daa520" stroke="#b87333" stroke-width="1.5"/>
  <!-- Laces -->
  <ellipse cx="42" cy="32" rx="8" ry="4" fill="#8b4513"/>
  <ellipse cx="52" cy="30" rx="8" ry="4" fill="#8b4513"/>
  <ellipse cx="62" cy="32" rx="6" ry="3" fill="#8b4513"/>
  <!-- Heel tab -->
  <path d="M45 16 L57 16 L53 22 L49 22 Z" fill="#cd7f32"/>
  <!-- Bronze shine effects -->
  <ellipse cx="40" cy="58" rx="15" ry="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Sole details -->
  <circle cx="25" cy="47" r="3" fill="#5c3317"/>
  <circle cx="42" cy="49" r="3" fill="#5c3317"/>
  <circle cx="62" cy="46" r="3" fill="#5c3317"/>
  <circle cx="82" cy="53" r="2" fill="#5c3317"/>
</svg>
