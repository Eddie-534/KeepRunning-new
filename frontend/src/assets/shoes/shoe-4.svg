<svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gold Shoe - Level 4 -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style={{stopColor: "#ffd700", stopOpacity: 1}} />
      <stop offset="50%" style={{stopColor: "#ffec8b", stopOpacity: 1}} />
      <stop offset="100%" style={{stopColor: "#daa520", stopOpacity: 1}} />
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Shoe sole -->
  <path d="M8 52 L25 34 L42 40 L62 37 L82 44 L92 52 L87 72 L13 72 Z" fill="url(#goldGrad)" stroke="#b8860b" stroke-width="2" filter="url(#goldGlow)"/>
  <!-- Shoe upper -->
  <path d="M25 34 L35 16 L50 14 L65 18 L75 32 L62 37 Z" fill="#fff8dc" stroke="#ffd700" stroke-width="1.5"/>
  <!-- Laces -->
  <ellipse cx="42" cy="28" rx="8" ry="4" fill="#8b6914"/>
  <ellipse cx="52" cy="26" rx="8" ry="4" fill="#8b6914"/>
  <ellipse cx="62" cy="28" rx="6" ry="3" fill="#8b6914"/>
  <!-- Heel tab -->
  <path d="M45 8 L59 8 L53 14 L51 14 Z" fill="#ffd700"/>
  <!-- Gold shine effects -->
  <ellipse cx="40" cy="58" rx="15" ry="3" fill="rgba(255,255,255,0.5)"/>
  <ellipse cx="60" cy="55" rx="10" ry="2" fill="rgba(255,255,255,0.4)"/>
  <ellipse cx="30" cy="52" rx="8" ry="2" fill="rgba(255,215,0,0.3)"/>
  <!-- Sole details -->
  <circle cx="25" cy="45" r="3" fill="#8b6914"/>
  <circle cx="42" cy="47" r="3" fill="#8b6914"/>
  <circle cx="62" cy="44" r="3" fill="#8b6914"/>
  <circle cx="82" cy="51" r="2" fill="#8b6914"/>
</svg>
