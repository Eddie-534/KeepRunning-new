<svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Silver Shoe - Level 3 -->
  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style={{stopColor: "#e8e8e8", stopOpacity: 1}} />
      <stop offset="50%" style={{stopColor: "#c0c0c0", stopOpacity: 1}} />
      <stop offset="100%" style={{stopColor: "#a8a8a8", stopOpacity: 1}} />
    </linearGradient>
    <filter id="silverGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Shoe sole -->
  <path d="M8 52 L25 36 L42 42 L62 39 L82 46 L92 54 L87 72 L13 72 Z" fill="url(#silverGrad)" stroke="#808080" stroke-width="2" filter="url(#silverGlow)"/>
  <!-- Shoe upper -->
  <path d="M25 36 L35 20 L50 18 L65 22 L75 34 L62 39 Z" fill="#f5f5f5" stroke="#c0c0c0" stroke-width="1.5"/>
  <!-- Laces -->
  <ellipse cx="42" cy="30" rx="8" ry="4" fill="#707070"/>
  <ellipse cx="52" cy="28" rx="8" ry="4" fill="#707070"/>
  <ellipse cx="62" cy="30" rx="6" ry="3" fill="#707070"/>
  <!-- Heel tab -->
  <path d="M45 12 L58 12 L53 18 L50 18 Z" fill="#d4d4d4"/>
  <!-- Silver shine effects -->
  <ellipse cx="40" cy="58" rx="15" ry="3" fill="rgba(255,255,255,0.4)"/>
  <ellipse cx="60" cy="55" rx="10" ry="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Sole details -->
  <circle cx="25" cy="46" r="3" fill="#505050"/>
  <circle cx="42" cy="48" r="3" fill="#505050"/>
  <circle cx="62" cy="45" r="3" fill="#505050"/>
  <circle cx="82" cy="52" r="2" fill="#505050"/>
</svg>
